  <section class="contact-section">
    <h1>Get In Touch</h1>
    <p>We'd love to hear from you. Send us a message and we'll respond within 24 hours.</p>

    <form id="contactForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
      </div>
      
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone">
      </div>
      
      <div class="form-group">
        <label for="service">Service Interested In</label>
        <select id="service" name="service">
          <option value="">Select a service</option>
          <option value="Basic">Basic Protection</option>
          <option value="Standard">Standard Protection</option>
          <option value="Premium">Premium Protection</option>
          <option value="Training">Cybersecurity Training</option>
          <option value="Consulting">Consulting & Audit</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>
      </div>
      
      <button type="submit" class="submit-btn">Send Message</button>
    </form>

    <div class="contact-info">
      <p><strong>Phone:</strong> <a href="tel:+254768741052">+254 768 741052</a></p>
      <p><strong>Email:</strong> <a href="mailto:infinitecyberspace.info@gmail.com">infinitecyberspace.info@gmail.com</a></p>
      <p><strong>Location:</strong> Kisumu County, Kenya</p>
    </div>
  </section>

  </footer>
